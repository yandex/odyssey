name: Performance tests
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
    paths:
      - "sources/**"
      - "test/perf/**"
      - "test/benchmark/**"
jobs:
  sqli-guard-perf:
    name: sqli_guard performance
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: sqli_guard benchmark (3 modes)
      run: make ci-perf-test
