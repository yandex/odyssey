pid_file "/tmp/odyssey.pid"
daemonize no

unix_socket_dir "/tmp"
unix_socket_mode "0644"
log_format "%p %t %l [%i %s] (%c) %m\n"
log_to_stdout yes
log_syslog no
log_syslog_ident "odyssey"
log_syslog_facility "daemon"
log_debug yes
log_config yes
log_session no
log_query yes
log_stats no
log_file "/tmp/odyssey.log"
stats_interval 60
workers "auto"
resolvers 1
readahead 8192
cache_coroutine 0
coroutine_stack_size 16
nodelay yes

keepalive 15
keepalive_keep_interval 75
keepalive_probes 9

keepalive_usr_timeout 0

listen {
	host "*"
	port 6432
	backlog 128
}


storage "postgres_server" {
	type "remote"
	host "[localhost]:5432"
}

database default {
	user default {
		authentication "none"
		storage "postgres_server"
		pool "transaction"
		pool_size 0
		pool_timeout 0
		pool_ttl 1201
		pool_smart_discard yes
		pool_cancel yes
		pool_rollback yes
		pool_client_idle_timeout 2090999
		pool_idle_in_transaction_timeout 2099
		client_fwd_error yes
		application_name_add_host yes
		server_lifetime 1901
		log_debug no
		client_max 2000
	}
}

storage "local" {
	type "local"
}

database "console" {
	user default {
		authentication "none"
		role "admin"
		pool "session"
		storage "local"
	}
}


locks_dir "/tmp/odyssey"

graceful_die_on_errors yes
enable_online_restart no
bindwith_reuseport yes