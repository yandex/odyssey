storage "postgres_server" {
    type "remote"
    host "[127.0.0.1]:6433"
}

storage "local" {
    type "local"
}

database "postgres" {
    user "postgres" {
        authentication "none"
        storage "postgres_server"
        pool "transaction"
        pool_size 20
        pool_cancel yes
    }
}

database "console" {
    user "console" {
        authentication "none"
        role "admin"
        pool "session"
        storage "local"
    }
}

daemonize yes
pid_file "/var/run/odyssey.pid"
locks_dir "/tmp"
log_format "%p %t %l [%i %s] (%c) %m\n"
log_file "/var/log/odyssey.log"
log_to_stdout no
log_config yes
log_debug no
log_session yes
log_stats yes
log_query no
stats_interval 1
coroutine_stack_size 24
workers 2
resolvers 1
client_max_routing 16

listen {
    host "127.0.0.1"
    port 6432
}
