unix_socket_dir "/tmp"
unix_socket_mode "0644"

log_format "%p %t %l [%i %s] (%c) %m"
log_file "/var/log/odyssey.log"
log_debug no
log_config no
log_session no
log_query no
log_stats yes
daemonize yes

locks_dir "/tmp/odyssey"
graceful_die_on_errors yes
enable_online_restart yes
bindwith_reuseport yes

stats_interval 60

pid_file "/var/run/odyssey.pid"

listen {
	host "*"
	port 6432
}


storage "local" {
	type "local"
}

storage "postgres_server" {
	type "remote"
	host "localhost:5432"
}

database default {
	user default {
		authentication "none"
		storage "postgres_server"
		pool "transaction"
		client_fwd_error yes
		pool_discard yes
		pool_cancel yes
		pool_rollback yes
	}
}

database "console" {
	user default {
		authentication "none"
		role "admin"
		pool "session"
		storage "local"
	}
}