log_format "%p %t %l [%i %s] (%c) %m\n"
log_max_msg_size "invalid_string"

listen {
        host "*"
}

storage "postgres_server" {
        type "remote"
        host "*"
}

database "db" {
        user "user" {
                storage "postgres_server"
                pool "session"
                authentication "none"
        }
}
