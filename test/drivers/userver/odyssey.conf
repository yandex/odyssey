daemonize               no
log_format              "tskv\ttimestamp=%t\tpid=%p\tunixtime=%n\tms=%e\tlevel=%l\tcid=%i\tsid=%s\tdb=%d\tuser=%u\tctx=%c\tcluster=mdbqpglgm5m6cqg1kvq0\thostname=sus\torigin=odyssey\tremote_addr=%h\tremote_port=%r\tmsg=%M\n"
log_to_stdout           yes
log_debug               no
log_query               no
log_config              yes
log_session             yes
log_stats               no
stats_interval          60
readahead               4096
cache_msg_gc_size       12288
nodelay                 yes
keepalive               15
keepalive_keep_interval 3
keepalive_probes        3
client_max              32000
resolvers               1
workers                 1

listen {
	host "*"
	port 6432
	backlog 128
	compression yes
	tls "disable"
}

storage "local" {
    type "local"
}

storage "pg_server" {
    type "remote"
    host "primary"
    port 5432
    tls "disable"
}

database "postgres" {
    user "postgres" {
        authentication "none"
        storage "pg_server"
        pool "session"
        pool_size 140
        application_name_add_host yes
        pool_timeout 1000
        pool_ttl 20
        pool_reserve_prepared_statement no
        pool_discard yes
        pool_cancel yes
        pool_rollback yes
        client_max 32000
        client_fwd_error yes
        quantiles "1,0.9999,0.999,0.99,0.95,0.9,0.75,0.5"
    }
}