services:
  primary:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_DB=postgres
    networks:
      - od_proto_test
    healthcheck:
      test: 'pg_isready -U postgres --dbname=postgres'
      interval: 1s
      timeout: 1s
      retries: 3

  tester:
    build:
      context: ../../ # odyssey root dir
      dockerfile: ./test/proto/Dockerfile
      args:
        odyssey_build_type: "${ODYSSEY_BUILD_TYPE:-build_release}"
        odyssey_cc: "${ODYSSEY_CC:-gcc}"
        test_tag: "${ODYSSEY_PROTO_TEST_TAG:-all}"
    networks:
      - od_proto_test
    environment:
      ASAN_OPTIONS: "log_path=/asan-output.log fast_unwind_on_malloc=0" # abort_on_error=1
      TSAN_OPTIONS: "log_path=/tsan-output.log"
    depends_on:
      primary:
        condition: service_healthy

networks:
  od_proto_test:
    driver: bridge
