unix_socket_dir "/tmp"
unix_socket_mode "0644"

log_format "%p %t %l [%i %s] (%c) %m\n"
log_to_stdout no
log_file "/var/odyssey.log"
log_session yes
log_query no
log_stats no

coroutine_stack_size 24

daemonize no

locks_dir "/tmp/odyssey"

listen {
	host "*"
	port 6432
}

storage "local" {
	type "local"
}

storage "postgres_server" {
	type "remote"
	host "primary"
	port 5432
}

database "postgres" {
	user "suser" {
		authentication "none"
		storage "postgres_server"
		pool "session"
		pool_size 10
		storage_user "postgres"
		client_fwd_error yes
	}

	user "tuser" {
		authentication "none"
		storage "postgres_server"
		pool "transaction"
		pool_size 10
		storage_user "postgres"
		client_fwd_error yes
	}
}

database "console" {
	user "console" {
		authentication "none"
		role "admin"
		pool "session"
		storage "local"
	}
}